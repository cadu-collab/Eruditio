<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eruditio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="logo">Eruditio</div>
      <p class="tagline">The art of the eloquent slight.</p>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Intelligence, weaponized.</h1>
        <p class="hero-sub">Select your context. Receive your compliment.</p>
      </div>
    </section>

    <section class="generator">
      <div class="container">

        <div class="controls">
          <div class="control-group">
            <label for="relationship">Recipient</label>
            <select id="relationship">
              <option value="general">Anyone</option>
              <option value="coworker">Coworker</option>
              <option value="boss">Boss</option>
              <option value="friend">Friend</option>
              <option value="ex">Ex</option>
            </select>
          </div>

          <div class="control-group">
            <label for="occasion">Occasion</label>
            <select id="occasion">
              <option value="general">Any</option>
              <option value="meeting">Meeting</option>
              <option value="party">Social event</option>
              <option value="text">Text / Message</option>
            </select>
          </div>

          <div class="control-group">
            <label>Tone</label>
            <div class="tone-options">
              <button class="tone-btn active" data-tone="1">Subtle</button>
              <button class="tone-btn" data-tone="2">Sharp</button>
              <button class="tone-btn" data-tone="3">Savage</button>
            </div>
          </div>
        </div>

        <button id="generate-btn" class="generate-btn">Generate</button>

        <div class="output" id="output" hidden>
          <div class="output-card">
            <div class="output-label">Your compliment</div>
            <p id="insult-text"></p>
            <div class="output-actions">
              <button id="copy-btn" class="copy-btn">Copy</button>
              <button id="another-btn" class="another-btn">Another one</button>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Eruditio &mdash; Because bluntness is for amateurs.</p>
    </div>
  </footer>

  <script src="src/js/main.js"></script>
</body>
</html>
