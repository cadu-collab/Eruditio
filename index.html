<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eruditio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">Eruditio</div>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="en">EN</button>
          <span class="lang-sep">/</span>
          <button class="lang-btn" data-lang="es">ES</button>
        </div>
        <p class="tagline" id="tagline">The art of the eloquent slight.</p>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1 id="hero-h1">Intelligence,<br>weaponized.</h1>
      <p class="hero-sub" id="hero-sub">Select your context. Receive your compliment.</p>
    </div>
  </section>

  <main>
    <section class="generator">
      <div class="container">
        <div class="generator-layout">

          <div class="generator-controls">
            <div class="controls">
              <div class="control-group">
                <label for="relationship" id="label-relationship">Recipient</label>
                <select id="relationship">
                  <option value="general" id="opt-r-general">Anyone</option>
                  <option value="coworker" id="opt-r-coworker">Coworker</option>
                  <option value="boss" id="opt-r-boss">Boss</option>
                  <option value="friend" id="opt-r-friend">Friend</option>
                  <option value="ex" id="opt-r-ex">Ex</option>
                </select>
              </div>

              <div class="control-group">
                <label for="occasion" id="label-occasion">Occasion</label>
                <select id="occasion">
                  <option value="general" id="opt-o-general">Any</option>
                  <option value="in-person" id="opt-o-inperson">In Person</option>
                  <option value="email" id="opt-o-email">Email</option>
                  <option value="text" id="opt-o-text">Text Message</option>
                </select>
              </div>

              <div class="control-group">
                <label id="label-tone">Tone</label>
                <div class="tone-options">
                  <button class="tone-btn active" data-tone="1" id="tone-btn-1">Subtle</button>
                  <button class="tone-btn" data-tone="2" id="tone-btn-2">Sharp</button>
                  <button class="tone-btn" data-tone="3" id="tone-btn-3">Savage</button>
                </div>
              </div>
            </div>

            <button id="generate-btn" class="generate-btn">Generate &#8594;</button>
          </div>

          <div class="generator-output">
            <div class="output-header">
              <span class="output-section-label" id="output-section-label">Your Compliments</span>
            </div>
            <div class="output" id="output" hidden>
              <ol class="results-list" id="results-list"></ol>
            </div>
            <div class="output-placeholder" id="output-placeholder">
              <p id="output-placeholder-text">Select a recipient, occasion, and tone &mdash; then generate.</p>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p id="footer-text">Eruditio &mdash; Because bluntness is for amateurs.</p>
    </div>
  </footer>

  <script src="src/js/main.js"></script>
</body>
</html>
